const {useState, useEffect, useMemo, useRef, useCallback} = React;

const ACCENT = "#EEFF00";
const BLUE = "#4A90D9";

const HOLDINGS = [
  { id:"jup",  sym:"JUP",       price:1.24,    qty:12400,    maxLtv:70, logo:JUP_LOGO },
  { id:"pump", sym:"PUMP",      price:0.0087,  qty:2800000,  maxLtv:45, logo:PUMP_LOGO },
  { id:"hype", sym:"HYPE",      price:24.80,   qty:520,      maxLtv:75, logo:HYPE_LOGO },
  { id:"fart", sym:"FARTCOIN",  price:1.42,    qty:8500,     maxLtv:40, logo:FART_LOGO },
  { id:"pm1",  sym:"BTC >$100K'26", price:0.62, qty:4200,   maxLtv:55, logo:BTC100K_LOGO, pm:true, side:"Yes" },
];

const RATE=0.0008;
const ORIG=0.001;

function fmt(n){
  if(n>=1000)return"$"+(n/1000).toFixed(1)+"k";
  return"$"+n.toFixed(0);
}
function fmtCost(n){
  if(n>=1000)return"$"+n.toLocaleString("en",{maximumFractionDigits:0});
  if(n>=1)return"$"+n.toFixed(2);
  return"$"+n.toFixed(2);
}

function App(){
  // Render popup directly centered on a dark bg
  return(
    <div style={{minHeight:"100vh",background:"#0a0a0a",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Bai Jamjuree',sans-serif"}}>
      <Popup/>
    </div>
  );
}

function Popup(){
  const[enabled,setEnabled]=useState({jup:true,pump:false,hype:true,fart:false,pm1:true});
  const[alloc,setAlloc]=useState({jup:100,pump:100,hype:100,fart:100,pm1:100});
  const[mode,setMode]=useState("cross");
  const[globalLtv,setGlobalLtv]=useState(null);
  const[tokenLtv,setTokenLtv]=useState({jup:null,pump:null,hype:null,fart:null,pm1:null});
  const[durIdx,setDurIdx]=useState(1);
  const[liqExpanded,setLiqExpanded]=useState(false);
  const[justToggled,setJustToggled]=useState(null);
  const[hoveredSym,setHoveredSym]=useState(null);
  const durs=[{l:"1D",d:1},{l:"7D",d:7},{l:"14D",d:14},{l:"30D",d:30}];
  const isCross=mode==="cross";

  const calc=useMemo(()=>{
    let coll=0,maxBorrow=0;
    const on=HOLDINGS.filter(h=>enabled[h.id]);
    const perToken=[];
    if(isCross){
      let wMaxLtv=0;
      on.forEach(h=>{
        const pledged=(h.price*h.qty)*(alloc[h.id]/100);
        coll+=pledged;
        wMaxLtv+=h.maxLtv*pledged;
      });
      const blendedMax=coll>0?wMaxLtv/coll:0;
      const effectiveLtv=globalLtv!==null?Math.min(globalLtv,blendedMax):blendedMax;
      const borrow=coll*(effectiveLtv/100);
      maxBorrow=coll*(blendedMax/100);
      const days=durs[durIdx].d;
      const cost=borrow*(RATE/100)*days*24+borrow*ORIG;
      const costPct=borrow>0?(cost/borrow)*100:0;
      const liqValue=borrow;
      const bufferPct=coll>0?((coll-borrow)/coll)*100:0;
      return{coll,borrow,cost,costPct,effectiveLtv,blendedMax,maxBorrow,days:durs[durIdx].l,liqValue,bufferPct,perToken};
    }else{
      let totalBorrow=0;
      on.forEach(h=>{
        const pledged=(h.price*h.qty)*(alloc[h.id]/100);
        coll+=pledged;
        const ltv=tokenLtv[h.id]!==null?Math.min(tokenLtv[h.id],h.maxLtv):h.maxLtv;
        const b=pledged*(ltv/100);
        totalBorrow+=b;
        maxBorrow+=pledged*(h.maxLtv/100);
        const liqPrice=b/(h.qty*(alloc[h.id]/100));
        const bufferPct=h.price>0?((h.price-liqPrice)/h.price)*100:0;
        perToken.push({sym:h.sym,price:h.price,liqPrice,bufferPct,pm:h.pm});
      });
      const days=durs[durIdx].d;
      const cost=totalBorrow*(RATE/100)*days*24+totalBorrow*ORIG;
      const costPct=totalBorrow>0?(cost/totalBorrow)*100:0;
      const liqValue=totalBorrow;
      const bufferPct=coll>0?((coll-totalBorrow)/coll)*100:0;
      return{coll,borrow:totalBorrow,cost,costPct,effectiveLtv:coll>0?(totalBorrow/coll)*100:0,blendedMax:coll>0?(maxBorrow/coll)*100:0,maxBorrow,days:durs[durIdx].l,liqValue,bufferPct,perToken};
    }
  },[enabled,alloc,mode,globalLtv,tokenLtv,durIdx]);

  const toggle=id=>{
    setEnabled(p=>({...p,[id]:!p[id]}));
    setJustToggled(id);
    setTimeout(()=>setJustToggled(null),500);
  };

  const blendedMaxRound=Math.round(calc.blendedMax);
  const crossLtvVal=globalLtv!==null?globalLtv:blendedMaxRound;
  const canUp=crossLtvVal<blendedMaxRound;
  const canDown=crossLtvVal>1;

  const C={chk:10,chkMr:7,logo:18,logoMr:6,name:80,sMx:6,coll:48,ltv:48,ltvMl:4,borr:50,borrMl:4};
  const ltvStyle={width:isCross?0:C.ltv,marginLeft:isCross?0:C.ltvMl,opacity:isCross?0:1,overflow:"hidden",transition:"width 0.3s ease, margin-left 0.3s ease, opacity 0.3s ease"};

  return(
    <div style={{
      width:480,position:"relative",overflow:"hidden",
      background:"radial-gradient(ellipse 120% 160% at 50% 105%, rgba(238,255,0,0.22) 0%, rgba(238,255,0,0.08) 40%, transparent 75%), #0e0e0e",
      border:"1px solid rgba(255,255,255,0.06)",
      borderRadius:14,fontFamily:"'Bai Jamjuree',sans-serif",
      boxShadow:"0 32px 80px rgba(0,0,0,0.7), inset 0 -20px 60px rgba(238,255,0,0.04)",
    }}>
      {/* Bottom edge glow line */}
      <div style={{position:"absolute",bottom:0,left:0,right:0,height:1,background:"linear-gradient(to right, transparent 2%, rgba(238,255,0,0.3) 15%, rgba(238,255,0,0.3) 85%, transparent 98%)",pointerEvents:"none"}}/>

      {/* Header */}
      <div style={{padding:"12px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
        <div style={{display:"flex",alignItems:"center",gap:13}}>
          <img src={DIMES_LOGO} style={{width:13,height:13}} alt="Dimes"/>
          <span style={{color:"#fff",fontSize:12.5,fontWeight:400}}>Borrow against your existing holdings</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <ModeToggle value={mode} onChange={setMode}/>
        </div>
      </div>

      {/* Column headers */}
      <div style={{padding:"8px 18px 5px",display:"flex",alignItems:"baseline"}}>
        <div style={{width:C.chk,marginRight:C.chkMr}}/>
        <div style={{width:C.logo+C.logoMr+C.name,flexShrink:0}}>
          <span style={{fontSize:10,color:"#777",fontWeight:500,whiteSpace:"nowrap"}}>Your tokens</span>
        </div>
        <div style={{flex:1,minWidth:40,margin:"0 "+C.sMx+"px",display:"flex",justifyContent:"center"}}>
          <span style={{fontSize:10,color:"#777",fontWeight:500,whiteSpace:"nowrap"}}>{"\u2190"} Balance used as collateral {"\u2192"}</span>
        </div>
        <div style={{width:C.coll}}/>
        <div style={{...ltvStyle,textAlign:"center",paddingRight:16}}><span style={{fontSize:10,color:"#777",fontWeight:500}}>LTV</span></div>
        <div style={{width:C.borr,marginLeft:C.borrMl,textAlign:"right"}}>
          <span style={{fontSize:10,color:"#777",fontWeight:500}}>Borrowed</span>
        </div>
      </div>

      {/* Token rows */}
      <div style={{padding:"0 18px"}}>
        {HOLDINGS.map((h,i)=>{
          const val=h.price*h.qty;
          const on=enabled[h.id];
          const pledged=val*(alloc[h.id]/100);
          const thisLtv=mode==="isolated"
            ?(tokenLtv[h.id]!==null?tokenLtv[h.id]:h.maxLtv)
            :(globalLtv!==null?Math.min(globalLtv,h.maxLtv):h.maxLtv);
          const borrowed=on?pledged*(thisLtv/100):0;
          const hl=justToggled===h.id;
          return(
            <div key={h.id} style={{
              display:"flex",alignItems:"center",padding:"8px 4px",margin:"0 -4px",
              borderBottom:i<HOLDINGS.length-1?"1px solid rgba(255,255,255,0.03)":"none",
              opacity:on?1:0.28,background:hl?"rgba(255,255,255,0.03)":"transparent",
              borderRadius:hl?4:0,transition:"opacity 0.2s, background 0.3s",
            }}>
              <button onClick={()=>toggle(h.id)} style={{background:"none",border:"none",cursor:"pointer",padding:0,width:C.chk,marginRight:C.chkMr,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{width:7,height:7,borderRadius:1.5,background:on?"#e8e8e8":"transparent",border:on?"none":"0.5px solid #fff",transition:"all 0.15s"}}/>
              </button>
              <img src={h.logo} style={{width:C.logo,height:C.logo,borderRadius:"50%",marginRight:C.logoMr}} alt={h.sym}/>
              <div style={{width:C.name,display:"flex",alignItems:"center",gap:3,flexShrink:0}}>
                <div style={{position:"relative",overflow:"visible",minWidth:0,flex:1}} onMouseEnter={()=>setHoveredSym(h.id)} onMouseLeave={()=>setHoveredSym(null)}>
                  <span style={{fontSize:13,fontWeight:on?600:300,color:"#e8e8e8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",transition:"font-weight 0.2s",display:"block"}}>{h.sym}</span>
                  {hoveredSym===h.id&&h.sym.length>8&&<div style={{position:"absolute",left:0,bottom:"100%",marginBottom:4,background:"#222",border:"1px solid rgba(255,255,255,0.1)",borderRadius:4,padding:"3px 8px",pointerEvents:"none",whiteSpace:"nowrap",zIndex:10,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:11,fontWeight:600,color:"#e8e8e8",lineHeight:1,display:"block"}}>{h.sym}</span></div>}
                </div>
                {h.pm&&<span style={{fontSize:9,fontWeight:600,color:"#44FF97",background:"rgba(68,255,151,0.1)",border:"1px solid rgba(68,255,151,0.3)",borderRadius:3,padding:"1px 5px",lineHeight:"12px",flexShrink:0}}>{h.side}</span>}
              </div>
              <SliderWithTooltip value={alloc[h.id]} onChange={v=>setAlloc(p=>({...p,[h.id]:v}))} enabled={on} style={{flex:1,minWidth:40,margin:"0 "+C.sMx+"px"}}/>
              <div style={{width:C.coll,textAlign:"right"}}>
                <span style={{fontSize:12,fontWeight:500,color:"#999"}}>{on?fmt(pledged):"\u2014"}</span>
              </div>
              <div style={{...ltvStyle,display:"flex",justifyContent:"flex-end",alignItems:"center"}}>
                {on?<LtvStepper value={tokenLtv[h.id]!==null?tokenLtv[h.id]:h.maxLtv} max={h.maxLtv} onChange={v=>setTokenLtv(p=>({...p,[h.id]:v}))}/>:<span style={{fontSize:12,color:"#333"}}>{"\u2014"}</span>}
              </div>
              <div style={{width:C.borr,marginLeft:C.borrMl,textAlign:"right"}}>
                <span style={{fontSize:12,fontWeight:500,color:on?"#e8e8e8":"#333"}}>{on?fmt(borrowed):"\u2014"}</span>
              </div>
            </div>
          );
        })}
      </div>

      {/* Totals */}
      {calc.borrow>0&&(
        <div style={{padding:"0 18px"}}>
          <div style={{borderTop:"1px solid rgba(255,255,255,0.08)",display:"flex",alignItems:"center",padding:"6px 4px 2px",margin:"0 -4px"}}>
            <div style={{width:C.chk,marginRight:C.chkMr}}/>
            <div style={{width:C.logo,marginRight:C.logoMr}}/>
            <div style={{width:C.name,flexShrink:0}}/>
            <div style={{flex:1,minWidth:40,margin:"0 "+C.sMx+"px"}}/>
            <div style={{width:C.coll,textAlign:"right"}}><span style={{fontSize:12,fontWeight:600,color:"#e8e8e8"}}>{fmt(calc.coll)}</span></div>
            <div style={ltvStyle}/>
            <div style={{width:C.borr,marginLeft:C.borrMl,textAlign:"right"}}><span style={{fontSize:12,fontWeight:600,color:"#e8e8e8"}}>{fmt(calc.borrow)}</span></div>
          </div>
        </div>
      )}

      {/* Bottom */}
      <div style={{padding:"8px 18px 16px",marginTop:2}}>
        {calc.borrow>0&&(
          <div style={{display:"grid",gridTemplateRows:isCross?"1fr":"0fr",opacity:isCross?1:0,transition:"grid-template-rows 0.3s ease, opacity 0.25s ease"}}>
            <div style={{overflow:"hidden"}}>
              <div style={{display:"flex",alignItems:"center",padding:"6px 0"}}>
                <span style={{fontSize:13,color:"#888",flexShrink:0}}>LTV</span>
                <div style={{flex:1,borderBottom:"1px dotted rgba(255,255,255,0.08)",margin:"0 8px",alignSelf:"center"}}/>
            <div style={{display:"flex",alignItems:"center",gap:0,flexShrink:0}}>
              <span style={{fontSize:12,fontWeight:600,color:"#e8e8e8"}}>{crossLtvVal}%</span>
              <div style={{display:"flex",flexDirection:"column",gap:0,marginLeft:2}}>
                <HoldArrow dir="up" disabled={!canUp} onStep={()=>setGlobalLtv(prev=>{const cur=prev!==null?prev:blendedMaxRound;const nv=Math.min(blendedMaxRound,cur+1);return nv>=blendedMaxRound?null:nv})}/>
                <HoldArrow dir="down" disabled={!canDown} onStep={()=>setGlobalLtv(prev=>{const cur=prev!==null?prev:blendedMaxRound;return Math.max(1,cur-1)})}/>
              </div>
            </div>
          </div>
            </div>
          </div>
        )}
        <div style={{display:"flex",alignItems:"center",padding:"6px 0"}}>
          <span style={{fontSize:13,color:"#888",flexShrink:0}}>Duration</span>
          <div style={{flex:1,borderBottom:"1px dotted rgba(255,255,255,0.08)",margin:"0 8px",alignSelf:"center"}}/>
          <div style={{display:"flex",gap:2}}>
            {durs.map((d,i)=>(
              <button key={d.l} onClick={()=>setDurIdx(i)} style={{
                padding:"3px 9px",borderRadius:4,
                border:durIdx===i?"1px solid rgba(255,255,255,0.12)":"1px solid transparent",
                cursor:"pointer",fontSize:12,fontWeight:durIdx===i?600:400,
                fontFamily:"'Bai Jamjuree',sans-serif",
                background:durIdx===i?"rgba(255,255,255,0.04)":"transparent",
                color:durIdx===i?"#e8e8e8":"#999",transition:"all 0.1s",
              }}>{d.l}</button>
            ))}
          </div>
        </div>
        {calc.borrow>0&&(
          <>
            <div style={{display:"flex",alignItems:"center",padding:"6px 0"}}>
              <span style={{fontSize:13,color:"#999",flexShrink:0,fontWeight:300}}>Cost</span>
              <div style={{flex:1,borderBottom:"1px dotted rgba(255,255,255,0.08)",margin:"0 8px",alignSelf:"center"}}/>
              <span style={{fontSize:13,color:"#999",flexShrink:0,fontWeight:300}}>{fmtCost(calc.cost)} ({calc.costPct.toFixed(1)}%)</span>
            </div>
            {isCross?(
              <div style={{display:"flex",alignItems:"center",padding:"6px 0"}}>
                <span style={{fontSize:13,color:"#999",flexShrink:0,fontWeight:300}}>Liquidation</span>
                <div style={{flex:1,borderBottom:"1px dotted rgba(255,255,255,0.08)",margin:"0 8px",alignSelf:"center"}}/>
                <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
                  <span style={{fontSize:13,color:"#999",fontWeight:300}}>{fmt(calc.liqValue)}</span>
                  <span style={{fontSize:12,fontWeight:500,color:"#e8e8e8"}}>{calc.bufferPct.toFixed(0)}%</span>
                </div>
              </div>
            ):(
              <>
                <div style={{display:"flex",alignItems:"center",padding:"6px 0",cursor:"pointer",userSelect:"none"}} onClick={()=>setLiqExpanded(p=>!p)}>
                  <span style={{fontSize:13,color:"#999",flexShrink:0,fontWeight:300}}>Liquidation</span>
                  <div style={{flex:1,borderBottom:"1px dotted rgba(255,255,255,0.08)",margin:"0 8px",alignSelf:"center"}}/>
                  <span style={{fontSize:10,color:"#888",transform:liqExpanded?"rotate(180deg)":"none",transition:"transform 0.15s",display:"inline-block",flexShrink:0}}>{"\u25BC"}</span>
                </div>
                {calc.perToken.length>0&&(
                  <div style={{display:"grid",gridTemplateRows:liqExpanded?"1fr":"0fr",opacity:liqExpanded?1:0,transition:"grid-template-rows 0.3s ease, opacity 0.25s ease"}}>
                    <div style={{overflow:"hidden"}}>
                      <div style={{padding:"2px 0"}}>
                        <div style={{display:"flex",padding:"2px 0 4px"}}>
                          <span style={{fontSize:10,color:"#777",flex:1}}>Token</span>
                          <span style={{fontSize:10,color:"#777",width:44,textAlign:"right"}}>Current</span>
                          <span style={{fontSize:10,color:"#777",width:44,textAlign:"right"}}>Liq.</span>
                          <span style={{fontSize:10,color:"#777",width:44,textAlign:"right"}}>Buffer</span>
                        </div>
                        {calc.perToken.map(t=>(
                          <div key={t.sym} style={{display:"flex",alignItems:"center",padding:"2px 0"}}>
                            <span style={{fontSize:12,color:"#999",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.sym}</span>
                            <span style={{fontSize:12,color:"#999",width:44,textAlign:"right"}}>{t.pm?"\u00A2"+(t.price*100).toFixed(0):"$"+t.price.toFixed(2)}</span>
                            <span style={{fontSize:12,color:"#999",width:44,textAlign:"right"}}>{t.pm?"\u00A2"+(t.liqPrice*100).toFixed(0):"$"+t.liqPrice.toFixed(2)}</span>
                            <span style={{fontSize:12,fontWeight:500,color:"#e8e8e8",width:44,textAlign:"right"}}>{t.bufferPct.toFixed(0)}%</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
              </>
            )}
          </>
        )}
        <button disabled={calc.borrow<=0} style={{
          width:"100%",padding:"9px 0",borderRadius:7,marginTop:10,
          border:calc.borrow>0?"1px solid rgba(255,255,255,0.12)":"1px solid rgba(255,255,255,0.04)",
          fontSize:12,fontWeight:600,cursor:calc.borrow>0?"pointer":"default",
          fontFamily:"'Bai Jamjuree',sans-serif",
          background:calc.borrow>0?"rgba(255,255,255,0.05)":"transparent",
          color:calc.borrow>0?"#e8e8e8":"#444",transition:"all 0.12s",
        }}
          onMouseEnter={e=>{if(calc.borrow>0){e.currentTarget.style.background="rgba(255,255,255,0.09)";e.currentTarget.style.borderColor="rgba(255,255,255,0.2)"}}}
          onMouseLeave={e=>{if(calc.borrow>0){e.currentTarget.style.background="rgba(255,255,255,0.05)";e.currentTarget.style.borderColor="rgba(255,255,255,0.12)"}}}
        >
          {calc.borrow>0?"Borrow "+fmt(calc.borrow)+" \u00B7 "+calc.days:"Select collateral"}
        </button>
        {calc.borrow>0&&(
          <div style={{textAlign:"center",marginTop:6}}>
            <span style={{fontSize:11,color:"#888",fontWeight:300}}>Borrowed amount will be reflected in USDC in your [partner] balance</span>
          </div>
        )}
      </div>
    </div>
  );
}

function SliderWithTooltip({value,onChange,enabled,style}){
  const[dragging,setDragging]=useState(false);
  const trackRef=useRef(null);
  const updateValue=useCallback((e)=>{
    const rect=trackRef.current?.getBoundingClientRect();
    if(!rect)return;
    const pct=Math.round(Math.max(0,Math.min(100,((e.clientX-rect.left)/rect.width)*100)));
    onChange(pct);
  },[onChange]);
  return(
    <div style={{...style,position:"relative",height:12,display:"flex",alignItems:"center"}}
      ref={trackRef}
      onPointerDown={e=>{if(!enabled)return;setDragging(true);e.currentTarget.setPointerCapture(e.pointerId);updateValue(e)}}
      onPointerMove={e=>{if(dragging&&enabled)updateValue(e)}}
      onPointerUp={()=>setDragging(false)}
      onPointerCancel={()=>setDragging(false)}
    >
      {enabled?(
        <>
          <div style={{position:"absolute",left:0,right:0,height:2,borderRadius:1,background:"rgba(255,255,255,0.06)"}}>
            <div style={{height:"100%",width:value+"%",borderRadius:1,background:"rgba(255,255,255,0.4)",transition:dragging?"none":"width 0.05s"}}/>
          </div>
          <div style={{position:"absolute",left:"calc("+value+"% - 4px)",width:8,height:8,borderRadius:"50%",background:"#e8e8e8",boxShadow:"0 0 4px rgba(255,255,255,0.08)",pointerEvents:"none",transition:dragging?"none":"left 0.05s"}}/>
          {dragging&&(
            <div style={{position:"absolute",left:value+"%",bottom:14,transform:"translateX(-50%)",background:"#222",border:"1px solid rgba(255,255,255,0.1)",borderRadius:4,padding:"2px 6px",pointerEvents:"none",whiteSpace:"nowrap",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontSize:11,fontWeight:600,color:"#e8e8e8",lineHeight:1,display:"block"}}>{value}%</span>
            </div>
          )}
        </>
      ):(
        <div style={{position:"absolute",left:0,right:0,height:2,borderRadius:1,background:"rgba(255,255,255,0.03)"}}/>
      )}
    </div>
  );
}

function HoldArrow({dir,disabled,onStep}){
  const intervalRef=useRef(null);const timeoutRef=useRef(null);const stepRef=useRef(onStep);
  stepRef.current=onStep;
  const startHold=useCallback(()=>{if(disabled)return;stepRef.current();timeoutRef.current=setTimeout(()=>{intervalRef.current=setInterval(()=>stepRef.current(),60)},400)},[disabled]);
  const stopHold=useCallback(()=>{if(timeoutRef.current)clearTimeout(timeoutRef.current);if(intervalRef.current)clearInterval(intervalRef.current);timeoutRef.current=null;intervalRef.current=null},[]);
  useEffect(()=>()=>stopHold(),[stopHold]);
  return(
    <button onMouseDown={startHold} onMouseUp={stopHold} onMouseLeave={e=>{stopHold();if(!disabled)e.currentTarget.style.color="#555"}} onTouchStart={startHold} onTouchEnd={stopHold} disabled={disabled}
      style={{width:14,height:9,borderRadius:2,border:"none",padding:0,background:"transparent",color:disabled?"#2a2a2a":"#555",fontSize:8,cursor:disabled?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"color 0.1s",userSelect:"none"}}
      onMouseEnter={e=>{if(!disabled)e.currentTarget.style.color="#999"}}
    >{dir==="up"?"\u25B2":"\u25BC"}</button>
  );
}

function LtvStepper({value,max,onChange}){
  const canUp=value<max;const canDown=value>1;
  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:0,width:"100%"}}>
      <span style={{fontSize:12,fontWeight:600,color:"#e8e8e8"}}>{value}%</span>
      <div style={{display:"flex",flexDirection:"column",gap:0,marginLeft:2}}>
        <HoldArrow dir="up" disabled={!canUp} onStep={()=>{if(canUp)onChange(Math.min(max,value+1))}}/>
        <HoldArrow dir="down" disabled={!canDown} onStep={()=>{if(canDown)onChange(Math.max(1,value-1))}}/>
      </div>
    </div>
  );
}

function ModeToggle({value,onChange}){
  const opts=[{k:"cross",l:"Cross"},{k:"isolated",l:"Isolated"}];
  const crossRef=useRef(null);const isoRef=useRef(null);
  const refs={cross:crossRef,isolated:isoRef};
  const[pill,setPill]=useState({left:0,width:0});
  useEffect(()=>{
    const el=refs[value]?.current;
    if(el){setPill({left:el.offsetLeft,width:el.offsetWidth})}
  },[value]);
  return(
    <div style={{display:"inline-flex",position:"relative",background:"rgba(255,255,255,0.04)",borderRadius:20,padding:2}}>
      <div style={{position:"absolute",top:2,left:pill.left,width:pill.width,height:"calc(100% - 4px)",borderRadius:20,background:"rgba(255,255,255,0.08)",transition:"left 0.25s ease, width 0.25s ease"}}/>
      {opts.map(m=>(
        <button ref={refs[m.k]} key={m.k} onClick={()=>onChange(m.k)} style={{
          padding:"4px 14px",border:"none",cursor:"pointer",fontSize:11,fontWeight:value===m.k?500:300,
          fontFamily:"'Bai Jamjuree',sans-serif",borderRadius:20,
          background:"transparent",position:"relative",zIndex:1,
          color:value===m.k?"#e8e8e8":"#555",
          transition:"color 0.25s",
        }}>{m.l}</button>
      ))}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
