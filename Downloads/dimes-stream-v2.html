/* simulated sparkline data: 14 data points of band % over 14 days */
function genSparkline(target){
  const pts=[];let v=target;
  for(let i=0;i<28;i++){v=v+(Math.random()-0.48)*1.8;v=Math.max(target-6,Math.min(target+6,v));pts.push(v);}
  return pts;
}

const TOKEN_ICONS={SOL:SOL_ICON,BTC:BTC_ICON,ETH:ETH_ICON,JTO:JTO_ICON,JLP:JLP_ICON,PUMP:PUMP_ICON};

function TokenIcon({color,sym,size=20}){
  const icon=TOKEN_ICONS[sym];
  if(icon) return <div style={{width:size,height:size,borderRadius:"50%",overflow:"hidden",flexShrink:0}}><img src={icon} style={{width:"100%",height:"100%",display:"block",objectFit:"cover"}} alt={sym}/></div>;
  return <div style={{width:size,height:size,borderRadius:"50%",background:color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.36,fontWeight:700,color:"#fff",flexShrink:0,lineHeight:1}}>{sym.charAt(0)}</div>;
}

function BackBtn({onClick}){
  return <button onClick={onClick} style={{background:"none",border:"none",cursor:"pointer",padding:"2px 0",display:"flex",alignItems:"center"}}><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="#888" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg></button>;
}

function FlowDots({color=T.accent,size=3}){
  return <div style={{display:"flex",gap:2,alignItems:"center"}}>{[0,1,2].map(i=><div key={i} style={{width:size,height:size,borderRadius:"50%",background:color,animation:`dotFlow 1.4s ease-in-out ${i*0.25}s infinite`}}/>)}</div>;
}

function Divider({m=0}){return <div style={{height:1,background:T.surface,margin:`${m}px 0`}}/>}

/* ── Slider ── */
function Slider({value,onChange,min,max,accent=false,style,formatLabel,onDragChange}){
  const[drag,setDrag]=useState(false);const ref=useRef(null);
  const pct=((value-min)/(max-min))*100;
  const update=useCallback(e=>{const r=ref.current?.getBoundingClientRect();if(!r)return;onChange(Math.round(clamp(((e.clientX-r.left)/r.width)*(max-min)+min,min,max)))},[onChange,min,max]);
  const label=formatLabel?formatLabel(value):value;
  const startDrag=()=>{setDrag(true);onDragChange&&onDragChange(true)};
  const endDrag=()=>{setDrag(false);onDragChange&&onDragChange(false)};
  return(
    <div style={{...style,position:"relative",height:36,display:"flex",alignItems:"center",cursor:"pointer"}} ref={ref}
      onPointerDown={e=>{startDrag();e.currentTarget.setPointerCapture(e.pointerId);update(e)}}
      onPointerMove={e=>{if(drag)update(e)}} onPointerUp={endDrag} onPointerCancel={endDrag}>
      <div style={{position:"absolute",left:0,right:0,height:2,borderRadius:1,background:"rgba(255,255,255,0.06)"}}>
        <div style={{height:"100%",width:pct+"%",borderRadius:1,background:accent?"linear-gradient(to right, transparent, rgba(238,255,0,0.4))":"linear-gradient(to right, transparent, rgba(255,255,255,0.35))",transition:drag?"none":"width 0.05s"}}/>
      </div>
      <div style={{position:"absolute",left:`calc(${pct}% - 5px)`,width:10,height:10,borderRadius:"50%",background:accent?T.accent:"#e8e8e8",boxShadow:"0 0 6px "+(accent?"rgba(238,255,0,0.2)":"rgba(255,255,255,0.08)"),pointerEvents:"none",transition:drag?"none":"left 0.05s"}}/>
    </div>
  );
}

/* ── Mini sparkline (SVG) ── */
function Sparkline({data,width=180,height=28,color=T.accent}){
  if(!data||data.length<2)return null;
  const mn=Math.min(...data),mx=Math.max(...data),range=mx-mn||1;
  const pts=data.map((v,i)=>{
    const x=(i/(data.length-1))*width;
    const y=height-((v-mn)/range)*(height-4)-2;
    return `${x},${y}`;
  }).join(" ");
  return(
    <svg width={width} height={height} style={{display:"block"}}>

/* ═══════════════════════════════════════
   VIEW 2 — STREAM SETUP (outcome-first)
   ═══════════════════════════════════════ */
function SetupView({assetId,existing,onBack,onActivate}){
  const asset=STREAM_ASSETS.find(a=>a.id===assetId);
  const price=asset.price;

  /* slider is denominated in USD of exposure, snapped to nice increments */
  const maxExposure=Math.round(ECV*0.5);
  const minExposure=Math.round(ECV*0.05);
  const step=assetId==="btc"?500:assetId==="eth"?200:100;
  const snap=v=>Math.round(v/step)*step;

  const[expUSD,setExpUSD]=useState(existing?existing.exposure:snap(ECV*0.3));
  const expQty=expUSD/price;
  const targetPct=((expUSD/ECV)*100);
  const bandLow=Math.max(1,Math.round(targetPct-5));
  const bandHigh=Math.min(60,Math.round(targetPct+5));
  const carryWk=expUSD*(CARRY_BPS_WK/10000);
  const carryYr=expUSD*(CARRY_ANNUAL_PCT/100);

  /* backtest */
  const bt=BACKTEST[assetId];
  const btGain=expUSD*(bt/100);

  /* details expanded */
  const[showDetails,setShowDetails]=useState(false);
  const[sliding,setSliding]=useState(false);
  const scrollRef=useRef(null);
  const[scrollH,setScrollH]=useState(null);
  const toggleDetails=()=>{
    const next=!showDetails;
    if(next&&scrollRef.current)setScrollH(scrollRef.current.offsetHeight);
    if(!next)setScrollH(null);
    setShowDetails(next);
    if(next)setTimeout(()=>{scrollRef.current?.scrollTo({top:scrollRef.current.scrollHeight,behavior:"smooth"})},50);
  };

  return(
    <div style={{animation:"slideRight 0.2s ease"}}>
      {/* header */}
      <div style={{padding:"14px 20px",display:"flex",alignItems:"center",gap:8,borderBottom:"1px solid "+T.surface}}>

        <TokenIcon color={asset.color} sym={asset.sym} size={15}/>

      <div ref={scrollRef} className={showDetails?"scrollable":""} style={{padding:"14px 20px 0",overflowY:showDetails?"auto":"visible",height:showDetails&&scrollH?scrollH:undefined}}>

          <div style={{fontSize:13,color:"#fff",marginBottom:16}}>Amplify your {asset.sym} exposure</div>

        </div>

          <Slider value={expUSD} onChange={v=>setExpUSD(snap(v))} min={minExposure} max={maxExposure} accent onDragChange={setSliding}

            <span style={{fontSize:11,color:T.faint}}>Conservative</span>
            <span style={{fontSize:11,color:T.faint}}>Aggressive</span>

        </div>

        {/* ── backtest callout ── */}

              {drop:40,factor:0.38},
              {drop:60,factor:0},
            ].map((s,i)=>{
              const newExp=Math.round(expUSD*s.factor);
              const newQty=newExp/price;
              return(
                <div key={s.drop} style={{display:"flex",alignItems:"center",padding:"7px 12px",background:i%2===0?"rgba(255,255,255,0.015)":"transparent",borderBottom:i<2?"1px solid "+T.surface:"none"}}>

            <div style={{position:"absolute",left:0,right:0,height:4,borderRadius:2,background:"rgba(255,255,255,0.03)"}}>
              <div style={{position:"absolute",left:0,right:0,height:"100%",borderRadius:2,background:"rgba(238,255,0,0.08)"}}/>
              <div style={{position:"absolute",left:((stream.target-stream.bandLow)/bandW*100)+"%",top:-4,width:1,height:12,background:"rgba(238,255,0,0.25)"}}/>
              <div style={{position:"absolute",left:bandPos+"%",top:-4,width:12,height:12,borderRadius:"50%",background:T.accent,boxShadow:"0 0 10px rgba(238,255,0,0.25)",transform:"translateX(-6px)"}}/>
            </div>
          </div>
        </div>

        {/* ── collateral health ── */}
        <div style={{marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
            <span style={{fontSize:11,color:T.faint,textTransform:"uppercase",letterSpacing:"0.5px"}}>Collateral Health</span>
            <span style={{fontSize:13,fontWeight:600,color:health>65?T.green:health>35?T.amber:T.red}}>{health}%</span>
          </div>
          <div style={{height:3,borderRadius:2,background:"rgba(255,255,255,0.04)"}}>
            <div style={{height:"100%",width:health+"%",borderRadius:2,background:health>65?T.green:health>35?T.amber:T.red,transition:"width 0.4s"}}/>
          </div>
        </div>

        {/* ── detail rows ── */}
        <div style={{padding:"8px 10px",borderRadius:8,background:T.surfHover,border:"1px solid "+T.surface,marginBottom:16}}>
          {[
            ["Carry / week","~"+fmt(carryWk)],
            ["Accrued cost",fmt(accrued)],
            ["Active since","2d 14h"],
            ["Adjustments","47"],
          ].map(([k,v],i,a)=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:i<a.length-1?"1px solid "+T.surface:"none"}}>
              <span style={{fontSize:11,color:T.dim}}>{k}</span>
              <span style={{fontSize:11,fontWeight:500,color:T.text}}>{v}</span>
            </div>
          ))}
        </div>

        {/* ── actions ── */}
        <div style={{display:"flex",gap:8}}>
          <button onClick={onAdjust}
            style={{flex:1,padding:"9px 0",border:"1px solid "+T.borderLight,borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:500,fontFamily:"'Bai Jamjuree',sans-serif",color:T.text,background:T.surfHover,transition:"all 0.15s"}}
            onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,0.08)"}}
            onMouseLeave={e=>{e.currentTarget.style.background=T.surfHover}}>
            Adjust
          </button>
          <button onClick={onDeactivate}
            style={{flex:1,padding:"9px 0",border:"1px solid rgba(239,68,68,0.12)",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:500,fontFamily:"'Bai Jamjuree',sans-serif",color:T.red,background:"rgba(239,68,68,0.03)",transition:"all 0.15s"}}
            onMouseEnter={e=>{e.currentTarget.style.background="rgba(239,68,68,0.07)"}}
            onMouseLeave={e=>{e.currentTarget.style.background="rgba(239,68,68,0.03)"}}>
            Deactivate
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   APP
   ═══════════════════════════════════════ */
function App(){
  const[view,setView]=useState("wallet");
  const[sel,setSel]=useState(null);
  const[streams,setStreams]=useState({});
  const handleSelect=id=>{setSel(id);setView(streams[id]?"active":"setup")};
  const handleActivate=cfg=>{setStreams(p=>({...p,[cfg.assetId]:cfg}));setView("active")};
  const handleDeactivate=()=>{setStreams(p=>{const n={...p};delete n[sel];return n});setSel(null);setView("wallet")};

  const asset=sel?STREAM_ASSETS.find(a=>a.id===sel):null;

  const isWallet=view==="wallet";

  return(
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Bai Jamjuree',sans-serif"}}>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div style={{width:380,position:"relative",zIndex:0,display:"flex",flexDirection:"column",background:isWallet?T.card:"radial-gradient(ellipse 120% 160% at 50% 105%, rgba(238,255,0,0.22) 0%, rgba(238,255,0,0.08) 40%, transparent 75%), "+T.card,border:"1px solid "+T.border,borderRadius:isWallet?"14px 14px 24px 24px":T.r,boxShadow:isWallet?"0 32px 80px rgba(0,0,0,0.7)":"0 32px 80px rgba(0,0,0,0.7), inset 0 -20px 60px rgba(238,255,0,0.04)",overflow:"hidden"}}>
          {isWallet&&<WalletView onSelect={handleSelect} streams={streams}/>}
          {view==="setup"&&asset&&<SetupView assetId={sel} existing={streams[sel]} onBack={()=>{setSel(null);setView("wallet")}} onActivate={handleActivate}/>}
          {view==="active"&&asset&&streams[sel]&&<ActiveView stream={streams[sel]} onBack={()=>{setSel(null);setView("wallet")}} onDeactivate={handleDeactivate} onAdjust={()=>setView("setup")}/>}
          {isWallet&&<div style={{padding:"0 10px 10px"}}><StreamCard onSelect={handleSelect} streams={streams}/></div>}
          {!isWallet&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:1,background:"linear-gradient(to right, transparent 2%, rgba(238,255,0,0.3) 15%, rgba(238,255,0,0.3) 85%, transparent 98%)",pointerEvents:"none"}}/>}
        </div>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
